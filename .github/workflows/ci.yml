# Milestone 8 — CI pipeline.
#
# Runs the full pytest suite (unit / integration / regression, see
# backend/pytest.ini) against a real MongoDB service container, matching
# how docker-compose.yml runs Mongo locally. Integration and regression
# tests refuse to run against a database named "smart_city_db" (the Render
# production name) as a safety guard -- see backend/tests/integration/conftest.py
# and backend/tests/regression/conftest.py -- so MONGO_DB_NAME below is
# deliberately something else.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: development
      LOG_LEVEL: INFO
      MONGO_URI: mongodb://localhost:27017
      MONGO_DB_NAME: smart_city_ci
      CORS_ALLOW_ORIGINS: "*"
      SECRET_KEY: ci-throwaway-secret-key-not-for-production-use
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      ADMIN_SEED_PASSWORD: ci-admin-password
      DEVICE_SEED_PASSWORD: ci-device-password

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: smart-city-platform/backend/requirements.txt

      - name: Install dependencies
        working-directory: smart-city-platform/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        working-directory: smart-city-platform/backend
        run: pytest -m unit

      - name: Run integration tests
        working-directory: smart-city-platform/backend
        run: pytest -m integration

      - name: Run regression tests
        working-directory: smart-city-platform/backend
        run: pytest -m regression
