; PlatformIO configuration for the ESP32 lamp node firmware.
;
; "platform = espressif32" is left unpinned (matches this project's minimal-
; config style elsewhere). As of writing, PlatformIO's official registry
; resolves this to Arduino-ESP32 core 2.0.17 (the registry has not shipped
; official core 3.x support) -- main.cpp's LEDC PWM calls are written
; against the 2.x API (ledcSetup/ledcAttachPin/ledcWrite(channel, duty))
; accordingly. If this platform version bumps to 3.x later, those calls
; would need updating to the newer ledcAttach(pin, ...)/ledcWrite(pin, ...)
; API -- check the resolved framework-arduinoespressif32 version in the
; build log if PWM stops compiling.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7
