# Docker Compose — local development stack.
#
# Three services per the DevOps requirement: backend, mongo, frontend.
# No MQTT broker service (project decision: ESP32 -> backend over HTTP REST).
#
# Run with:  docker-compose up --build

services:
  mongo:
    image: mongo:7.0
    container_name: smart-city-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-smart_city_db}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-city-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      APP_ENV: ${APP_ENV:-development}
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: ${MONGO_DB_NAME:-smart_city_db}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
      # Dev-only fallback -- set a real SECRET_KEY in your .env for anything
      # beyond local experimentation.
      SECRET_KEY: ${SECRET_KEY:-dev-only-insecure-secret-key}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-}
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-city-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  mongo_data:
