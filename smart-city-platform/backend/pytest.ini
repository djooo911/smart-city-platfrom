[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers
markers =
    unit: fast, isolated tests with no external dependencies
    integration: tests that hit MongoDB or other real infrastructure
    regression: end-to-end API regression tests (run in CI on every PR)
